name: SauceDemo E2E Tests - Serenity BDD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Configurar JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Instalar Google Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Ejecutar pruebas E2E con Serenity
        run: mvn clean verify -Dwebdriver.chrome.args="--headless=new,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1920,1080"

      - name: Publicar reporte Serenity
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: serenity-report
          path: target/site/serenity/
          retention-days: 30

      - name: Publicar reporte Cucumber
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: cucumber-report
          path: target/cucumber-reports/
          retention-days: 30
