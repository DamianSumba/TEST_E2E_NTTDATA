serenity {
  project.name = "SauceDemo E2E Tests"

  take.screenshots = FOR_EACH_ACTION
  
  # Reports
  report.root = "target/site/serenity"
}

webdriver {
  driver = chrome
  
  autodownload = true
  
  capabilities {
    browserName = "chrome"
    
    "goog:chromeOptions" {
      args = ["--no-sandbox", "--disable-dev-shm-usage", "--disable-gpu", "--window-size=1920,1080"]
    }
  }
}

environments {
  default {
    webdriver.base.url = "https://www.saucedemo.com"
  }
}
